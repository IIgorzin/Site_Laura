<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/stylesfonte.css">
    <link rel="stylesheet" href="css/viewtransition.css">
    <link rel="stylesheet" href="css/Carrossel.css">
    <link rel="stylesheet" href="css/Carta.css">
    <link rel="icon" type="image/jpg" href="pics/noscarrotremido.jpg">
    <title>MUSEU</title>
</head>
<body>
    <a href="index.html" class="btn-voltar">←</a>

    <div id="carrossel" class="carrossel">
        <img id="fotoAtual" class="fotocarrossel">
        
        <p id="legenda"></p>

        <p id="contadorFotos"></p>

        <div class="controles">
            <button onclick="anterior()">◀</button>
            <button onclick="proxima()">▶</button>
        </div>

    </div>
    <button id="btnCarta" onclick="irParaOutraSecao()">💌 Ver outra parte</button>

    <div id="carta" class="escondido">
        <div id="envelope" onclick="abrirCarta()">
            <div class="envelopeTampa"></div>
            <div class="envelopeCorpo"></div>
            <p>SURPRESINHA 💌</p>
        </div>

        <div id="conteudoCarta" class="escondidoCarta">
            <p id="dataCarta"></p>
            <h2 id="tituloCarta"></h2>
            <p id="textoCarta"></p>
            <p id="contadorCarta"></p>
            <div class="controlesCarta">
                <button onclick="cartaAnterior()">◀</button>
                <button onclick="proximaCarta()">▶</button>
            </div>
            <a href="final.html" id="btnFinalizar" class="escondido">
                😉 Finalizar Experiência.
            </a>
        </div>
    </div>

    <script src="script/scriptFoto.js"></script>
    <script src="script/scriptCarta.js"></script>
</body>
</html>
